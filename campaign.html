<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title id="ptitle">Рекламная площадка</title>
<meta property="og:title" content="" id="og-t">
<meta property="og:description" content="" id="og-d">
<meta property="og:image" content="" id="og-i">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',Arial,sans-serif;background:#0a0a1a;color:#e0e0e0;overflow-x:hidden}
:root{--accent:#FFD700}

/* Lang switcher */
.lang-sw{position:fixed;top:12px;right:12px;z-index:100;display:flex;gap:4px;background:rgba(10,10,26,0.9);border:1px solid #2a2a4a;border-radius:10px;padding:4px}
.lang-btn{padding:5px 10px;border:none;border-radius:7px;background:transparent;color:#888;font-size:11px;font-weight:600;cursor:pointer;transition:.2s}
.lang-btn:hover{color:#fff}
.lang-btn.active{background:var(--accent);color:#000}

/* Loading */
.ld{position:fixed;top:0;left:0;right:0;bottom:0;background:#0a0a1a;display:flex;align-items:center;justify-content:center;z-index:200;transition:opacity .3s}
.ld.off{opacity:0;pointer-events:none}
.sp{width:36px;height:36px;border:3px solid #333;border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

.wrap{max-width:480px;margin:0 auto;padding:16px;display:none}
.wrap.on{display:block}

/* Vertical mode */
.wrap.v-mode{height:100vh;display:none;flex-direction:column;overflow:hidden;padding-bottom:0}
.wrap.v-mode.on{display:flex}

.hdr{display:flex;align-items:center;gap:12px;margin-bottom:12px;flex-shrink:0}
.hdr-logo{width:48px;height:48px;border-radius:50%;object-fit:cover;border:2px solid var(--accent);flex-shrink:0}
.hdr-logo-ph{width:48px;height:48px;border-radius:50%;background:var(--accent);display:flex;align-items:center;justify-content:center;font-size:22px;border:2px solid var(--accent);flex-shrink:0}
.hdr-name{font-size:18px;font-weight:800;color:#fff}
.hdr-sub{font-size:10px;color:#888;margin-top:2px}

.progress{width:100%;height:3px;background:#1a1a35;border-radius:2px;margin-bottom:12px;overflow:hidden;flex-shrink:0}
.progress-fill{height:100%;background:var(--accent);border-radius:2px;transition:width .3s ease}

/* Video */
.vid{position:relative;padding-bottom:56.25%;height:0;border-radius:14px;overflow:hidden;margin-bottom:14px;border:1px solid #2a2a4a;flex-shrink:0}
.vid iframe{position:absolute;top:0;left:0;width:100%;height:100%;border:none}
.hero-img{width:100%;border-radius:14px;margin-bottom:14px;max-height:280px;object-fit:cover;border:1px solid #2a2a4a;flex-shrink:0}

/* ═══ SWIPE HINT ═══ */
.swipe-hint{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);z-index:50;pointer-events:none;transition:opacity .5s;display:flex;flex-direction:column;align-items:center;gap:6px}
.swipe-hint.gone{opacity:0}
.hint-hand{font-size:32px;animation:hintMove 1.5s ease-in-out infinite}
.hint-text{font-size:11px;color:rgba(255,255,255,0.5);white-space:nowrap}

/* Horizontal hint */
.hint-h .hint-hand{animation:hintH 1.5s ease-in-out infinite}
@keyframes hintH{0%,100%{transform:translateX(0)}50%{transform:translateX(-30px)}}

/* Vertical hint */
.hint-v .hint-hand{animation:hintV 1.5s ease-in-out infinite}
@keyframes hintV{0%,100%{transform:translateY(0)}50%{transform:translateY(-25px)}}

/* Cards hint (same as horizontal) */
.hint-c .hint-hand{animation:hintH 1.5s ease-in-out infinite}

/* ═══ COMMON SLIDE ═══ */
.sl{position:relative;overflow:hidden;display:flex;flex-direction:column;justify-content:flex-end;padding:24px}
.sl-grad{position:absolute;top:0;left:0;width:100%;height:100%}
.sl-cnt{position:relative;z-index:2}
.sl-e{font-size:36px;margin-bottom:8px;filter:drop-shadow(0 2px 6px rgba(0,0,0,0.4))}
.sl-t{font-size:22px;font-weight:800;color:#fff;line-height:1.25;margin-bottom:10px;text-shadow:0 2px 12px rgba(0,0,0,0.6)}
.sl-p{font-size:14px;color:rgba(255,255,255,0.88);line-height:1.7;text-shadow:0 1px 6px rgba(0,0,0,0.5)}
.sl-img{width:100%;border-radius:12px;margin-bottom:12px;max-height:160px;object-fit:cover;box-shadow:0 4px 16px rgba(0,0,0,0.4)}
.sl::after{content:'';position:absolute;right:0;top:0;width:16px;height:100%;background:linear-gradient(90deg,transparent,rgba(0,0,0,0.25));z-index:3;pointer-events:none}

/* ═══ CARDS (template 1) ═══ */
.deck{position:relative;width:100%;height:420px;margin-bottom:14px;perspective:800px}
.deck .sl{position:absolute;top:0;left:0;width:100%;height:400px;border-radius:20px;transition:transform .4s cubic-bezier(.25,.8,.25,1),opacity .3s;will-change:transform;cursor:pointer}
.deck .sl[data-pos="0"]{z-index:10;transform:translateY(0) scale(1);opacity:1}
.deck .sl[data-pos="1"]{z-index:5;transform:translateY(10px) scale(.97);opacity:.55;pointer-events:none}
.deck .sl[data-pos="2"]{z-index:3;transform:translateY(20px) scale(.94);opacity:.25;pointer-events:none}
.deck .sl[data-pos="h"]{z-index:0;opacity:0;pointer-events:none;transform:translateY(30px) scale(.9)}
.deck .sl.fly-l{transform:translateX(-110%) rotate(-12deg)!important;opacity:0!important;transition:transform .35s ease-out,opacity .25s}
.deck .sl.fly-r{transform:translateX(110%) rotate(12deg)!important;opacity:0!important;transition:transform .35s ease-out,opacity .25s}

/* ═══ HORIZONTAL SLIDER (template 2) ═══ */
.h-vp{width:100%;overflow:hidden;border-radius:20px;margin-bottom:14px;position:relative}
.h-track{display:flex;transition:transform .4s cubic-bezier(.25,.8,.25,1);will-change:transform}
.h-track.drag{transition:none}
.h-track .sl{flex:0 0 100%;min-height:400px;border-radius:0}

/* ═══ VERTICAL SLIDER (template 3) ═══ */
.v-vp{flex:1;overflow:hidden;border-radius:20px;position:relative;touch-action:none}
.v-track{transition:transform .4s cubic-bezier(.25,.8,.25,1);will-change:transform}
.v-track.drag{transition:none}
.v-track .sl{width:100%;border-radius:0}
.v-track .sl::after{width:100%;height:16px;right:auto;bottom:0;top:auto;background:linear-gradient(transparent,rgba(0,0,0,0.25))}

/* Bottom */
.btm{flex-shrink:0;padding-top:10px}
.stats{display:flex;justify-content:center;gap:24px;margin-bottom:10px}
.st{text-align:center}
.st-n{font-size:16px;font-weight:700;color:var(--accent)}
.st-l{font-size:8px;color:#666;text-transform:uppercase;letter-spacing:1px}
.cta{display:block;width:100%;padding:15px;border-radius:14px;font-size:16px;font-weight:700;color:#000;text-align:center;text-decoration:none;box-shadow:0 4px 16px rgba(0,0,0,0.2);transition:transform .2s}
.cta:hover{transform:translateY(-2px)}
.cta-note{text-align:center;font-size:9px;color:#555;margin-top:6px}
.cons{display:flex;gap:8px;justify-content:center;margin:12px 0}
.con{padding:7px 16px;border-radius:8px;border:1px solid #222;background:#111;color:#aaa;text-decoration:none;font-size:11px;transition:.2s}
.con:hover{border-color:var(--accent);color:var(--accent)}
.foot{text-align:center;padding:12px 0;font-size:10px;color:#444;border-top:1px solid #151525;margin-top:10px}
.foot a{color:#555;text-decoration:none}

.nf{text-align:center;padding:80px 20px;display:none}
.nf h2{color:var(--accent);margin-bottom:10px}
.nf a{color:var(--accent)}
</style>
</head>
<body>
<div class="lang-sw">
    <button class="lang-btn active" onclick="setCLang('ru')">RU</button>
    <button class="lang-btn" onclick="setCLang('ua')">UA</button>
    <button class="lang-btn" onclick="setCLang('en')">EN</button>
</div>
<div class="ld" id="ld"><div class="sp"></div></div>
<div id="app"></div>
<div class="nf" id="nf"><h2 data-ct="notFound">Кампания не найдена</h2><p style="color:#888"><span data-ct="notFoundSub">Проверьте ссылку или</span> <a href="/" data-ct="goBack">вернитесь на главную</a></p></div>

<script>
// ═══ МУЛЬТИЯЗЫЧНОСТЬ ═══
var cLang = localStorage.getItem('gwad-lang') || 'ru';
var CT = {
    ru: { participants:'участников', clicks:'кликов', registrations:'регистраций', join:'Присоединиться',
          ctaNote:'Реклама от $5 · Блокчейн opBNB · SafePal', notFound:'Кампания не найдена', notFoundSub:'Проверьте ссылку или', goBack:'вернитесь на главную',
          slide1:'Реклама от $5', slide1t:'Оплатил — контакты приходят в ваш кабинет',
          slide2:'Ваши контакты — только ВАШИ', slide2t:'Никто не получит доступ к вашей базе',
          slide3:'Блокчейн защита', slide3t:'Все выплаты прозрачны',
          slide4:'Автоматика 24/7', slide4t:'Боты и рассылки работают за вас' },
    ua: { participants:'учасників', clicks:'кліків', registrations:'реєстрацій', join:'Приєднатися',
          ctaNote:'Реклама від $5 · Блокчейн opBNB · SafePal', notFound:'Кампанію не знайдено', notFoundSub:'Перевірте посилання або', goBack:'поверніться на головну',
          slide1:'Реклама від $5', slide1t:'Оплатив — контакти приходять в кабінет',
          slide2:'Ваші контакти — тільки ВАШІ', slide2t:'Ніхто не отримає доступ до бази',
          slide3:'Блокчейн захист', slide3t:'Всі виплати прозорі',
          slide4:'Автоматика 24/7', slide4t:'Боти і розсилки працюють за вас' },
    en: { participants:'participants', clicks:'clicks', registrations:'registrations', join:'Join now',
          ctaNote:'Ads from $5 · Blockchain opBNB · SafePal', notFound:'Campaign not found', notFoundSub:'Check the link or', goBack:'go to main page',
          slide1:'Ads from $5', slide1t:'Pay once — contacts come to your dashboard',
          slide2:'Your contacts — only YOURS', slide2t:'Nobody gets access to your database',
          slide3:'Blockchain protection', slide3t:'All payments are transparent',
          slide4:'24/7 Automation', slide4t:'Bots and mailings work for you' },
};

function setCLang(lang) {
    cLang = lang;
    localStorage.setItem('gwad-lang', lang);
    document.querySelectorAll('.lang-btn').forEach(function(b){b.classList.remove('active')});
    document.querySelector('.lang-btn[onclick*="\''+lang+'\'"]').classList.add('active');
    document.documentElement.lang = lang === 'ua' ? 'uk' : lang;
    // Обновляем статические элементы
    document.querySelectorAll('[data-ct]').forEach(function(el) {
        var key = el.getAttribute('data-ct');
        if (CT[lang] && CT[lang][key]) el.textContent = CT[lang][key];
    });
}

// Инициализация языка
(function(){ var s=localStorage.getItem('gwad-lang'); if(s&&CT[s]){cLang=s} else{var n=(navigator.language||'').toLowerCase();if(n.startsWith('uk'))cLang='ua';else if(n.startsWith('en'))cLang='en';else cLang='ru'} document.querySelector('.lang-btn[onclick*="\''+cLang+'\'"]').classList.add('active'); document.querySelectorAll('.lang-btn').forEach(function(b){if(!b.classList.contains('active'))b.classList.remove('active')}); setCLang(cLang); })();

function t(key) { return (CT[cLang] && CT[cLang][key]) || (CT.ru[key]) || key; }

(async function(){
    var slug = window.location.pathname.replace('/c/','').replace(/\/$/,'');
    if (!slug) slug = new URLSearchParams(location.search).get('slug')||'';
    if (!slug){done();document.getElementById('nf').style.display='block';return}

    try{
        var r=await fetch('/api/campaign-data?slug='+slug);
        var d=await r.json();
        if(!d.ok||!d.campaign){done();document.getElementById('nf').style.display='block';return}
        build(d.campaign);
    }catch(e){done();document.getElementById('nf').style.display='block'}
})();

function done(){document.getElementById('ld').classList.add('off')}
function esc(s){var d=document.createElement('div');d.textContent=s||'';return d.innerHTML}

var colors=['linear-gradient(145deg,#0d47a1,#1565c0 50%,#0d47a1)','linear-gradient(145deg,#004d40,#00695c 50%,#004d40)','linear-gradient(145deg,#880e4f,#ad1457 50%,#880e4f)','linear-gradient(145deg,#4a148c,#6a1b9a 50%,#4a148c)','linear-gradient(145deg,#bf360c,#e65100 50%,#bf360c)','linear-gradient(145deg,#1a237e,#283593 50%,#1a237e)','linear-gradient(145deg,#1b5e20,#2e7d32 50%,#1b5e20)','linear-gradient(145deg,#827717,#9e9d24 50%,#827717)'];
var icons={diamond_club:'💎',metr:'🏠',cardgift:'🎁',health:'🌿',custom:'📢'};

function buildSlides(c){
    var slides=[];
    if(c.description) slides.push({emoji:icons[c.target_project]||'📢',title:c.name,text:c.description,img:''});
    if(c.features){
        c.features.split('\n').filter(function(l){return l.trim()}).forEach(function(line){
            var p=line.split('|');
            if(p.length>=2){var ic=p[0].trim(),tx=p.slice(1).join('|').trim(),im='';
                if(ic.startsWith('http')){im=ic;ic=''}
                slides.push({emoji:ic,title:'',text:tx,img:im});
            }else slides.push({emoji:'',title:'',text:p[0].trim(),img:''});
        });
    }
    if(slides.length===0){
        slides.push({emoji:'📢',title:t('slide1'),text:t('slide1t'),img:''});
        slides.push({emoji:'🔐',title:t('slide2'),text:t('slide2t'),img:''});
        slides.push({emoji:'🛡️',title:t('slide3'),text:t('slide3t'),img:''});
        slides.push({emoji:'🚀',title:t('slide4'),text:t('slide4t'),img:''});
    }
    return slides;
}

function slideHTML(s,i){
    var bg=colors[i%colors.length];
    return '<div class="sl" data-i="'+i+'"><div class="sl-grad" style="background:'+bg+'"></div><div class="sl-cnt">'+
        (s.img?'<img src="'+esc(s.img)+'" class="sl-img">':'')+
        (s.emoji?'<div class="sl-e">'+s.emoji+'</div>':'')+
        (s.title?'<div class="sl-t">'+esc(s.title)+'</div>':'')+
        '<div class="sl-p">'+esc(s.text).replace(/\n/g,'<br>')+'</div></div></div>';
}

function build(c){
    var color=c.primary_color||'#FFD700';
    document.documentElement.style.setProperty('--accent',color);
    document.getElementById('ptitle').textContent=c.name;
    var tpl=c.template||'cards';
    var slides=buildSlides(c);
    var ref=new URLSearchParams(location.search).get('ref')||'';
    var base=c.target_url||'https://cgift.club/registration.html';
    var sep=base.includes('?')?'&':'?';
    var ctaUrl=base+(ref?sep+'ref='+ref:'')+(ref?'&':sep)+'utm_source=gwads&utm_campaign='+(c.slug||'');
    var darken=function(h){var r=parseInt(h.slice(1,3),16)*.7,g=parseInt(h.slice(3,5),16)*.7,b=parseInt(h.slice(5,7),16)*.7;return'#'+[r,g,b].map(function(v){return Math.round(v).toString(16).padStart(2,'0')}).join('')};

    // Header
    var hdr='<div class="hdr">';
    if(c.logo_url) hdr+='<img src="'+esc(c.logo_url)+'" class="hdr-logo">';
    else hdr+='<div class="hdr-logo-ph">'+(icons[c.target_project]||'📢')+'</div>';
    hdr+='<div><div class="hdr-name">'+esc(c.name)+'</div>'+(c.subtitle?'<div class="hdr-sub">'+esc(c.subtitle)+'</div>':'')+'</div></div>';

    var prog='<div class="progress"><div class="progress-fill" id="prog" style="width:'+(100/slides.length)+'%"></div></div>';

    // Video / image
    var media='';
    if(c.video_url){var em=getEmbed(c.video_url);if(em) media='<div class="vid"><iframe src="'+em+'" allowfullscreen></iframe></div>'}
    if(!c.video_url&&c.hero_image_url) media='<img src="'+esc(c.hero_image_url)+'" class="hero-img">';

    // Bottom
    var btm='<div class="btm"><div class="stats">'+
        '<div class="st"><div class="st-n">'+(c.active_participants||0)+'</div><div class="st-l" data-ct="participants">'+t('participants')+'</div></div>'+
        '<div class="st"><div class="st-n">'+(c.total_clicks||0)+'</div><div class="st-l" data-ct="clicks">'+t('clicks')+'</div></div>'+
        '<div class="st"><div class="st-n">'+(c.total_registrations||0)+'</div><div class="st-l" data-ct="registrations">'+t('registrations')+'</div></div></div>'+
        '<a href="'+ctaUrl+'" class="cta" style="background:linear-gradient(135deg,'+color+','+darken(color)+')">'+esc(c.cta_text||t('join'))+'</a>'+
        '<div class="cta-note" data-ct="ctaNote">'+t('ctaNote')+'</div>';
    if(c.contact_telegram||c.contact_whatsapp){
        btm+='<div class="cons">';
        if(c.contact_telegram) btm+='<a href="https://t.me/'+esc(c.contact_telegram.replace('@',''))+'" class="con" target="_blank">📱 Telegram</a>';
        if(c.contact_whatsapp) btm+='<a href="https://wa.me/'+esc(c.contact_whatsapp.replace(/[^0-9]/g,''))+'" class="con" target="_blank">💬 WhatsApp</a>';
        btm+='</div>';
    }
    btm+='<div class="foot"><a href="/">gwad.ink</a> · 2026</div></div>';

    var hintDir=tpl==='vertical'?'hint-v':'hint-h';
    var hintArrow=tpl==='vertical'?'👆':'👈';
    var hint='<div class="swipe-hint '+hintDir+'" id="hint"><div class="hint-hand">'+hintArrow+'</div></div>';

    var html='';
    if(tpl==='cards'){
        html='<div class="wrap on">'+hdr+prog+media+'<div class="deck" id="deck">'+hint;
        slides.forEach(function(s,i){html+=slideHTML(s,i).replace('class="sl"','class="sl" data-pos="'+(i===0?'0':i===1?'1':i===2?'2':'h')+'"')});
        html+='</div>'+btm+'</div>';
    } else if(tpl==='slider'){
        html='<div class="wrap on">'+hdr+prog+media+'<div class="h-vp" id="hvp">'+hint+'<div class="h-track" id="htrack">';
        slides.forEach(function(s,i){html+=slideHTML(s,i)});
        html+='</div></div>'+btm+'</div>';
    } else {
        html='<div class="wrap v-mode on">'+hdr+prog+media+'<div class="v-vp" id="vvp">'+hint+'<div class="v-track" id="vtrack">';
        slides.forEach(function(s,i){html+=slideHTML(s,i)});
        html+='</div></div>'+btm+'</div>';
    }

    document.getElementById('app').innerHTML=html;
    done();

    if(tpl==='cards') initCards(slides.length);
    else if(tpl==='slider') initHSlider(slides.length);
    else initVSlider(slides.length);
}

function hideHint(){var h=document.getElementById('hint');if(h)h.classList.add('gone')}

// ═══ CARDS ENGINE ═══
function initCards(total){
    var deck=document.getElementById('deck');if(!deck)return;
    var all=Array.from(deck.querySelectorAll('.sl'));var cur=0;var sx=0,dx=0,dr=false;
    function pos(){all.forEach(function(c,i){var d=((i-cur)%total+total)%total;c.setAttribute('data-pos',d===0?'0':d===1?'1':d===2?'2':'h');c.classList.remove('fly-l','fly-r');c.style.transform='';c.style.opacity=''});upProg(cur,total)}
    function sw(dir){var a=all[cur];a.classList.add(dir<0?'fly-l':'fly-r');setTimeout(function(){cur=(cur+1)%total;pos()},300);hideHint()}
    deck.addEventListener('touchstart',function(e){sx=e.touches[0].clientX;dr=true;dx=0},{passive:true});
    deck.addEventListener('touchmove',function(e){if(!dr)return;dx=e.touches[0].clientX-sx;var c=all[cur];c.style.transition='none';c.style.transform='translateX('+dx+'px) rotate('+(dx*.08)+'deg)';c.style.opacity=1-Math.abs(dx)/500},{passive:true});
    deck.addEventListener('touchend',function(){if(!dr)return;dr=false;var c=all[cur];c.style.transition='';c.style.opacity='';if(Math.abs(dx)>50)sw(dx<0?-1:1);else c.style.transform='';dx=0});
    deck.addEventListener('click',function(){if(Math.abs(dx)<5)sw(-1)});
    pos();
}

// ═══ H-SLIDER ENGINE ═══
function initHSlider(total){
    var vp=document.getElementById('hvp'),tr=document.getElementById('htrack');if(!vp||!tr)return;
    var cur=0,sx=0,dx=0,dr=false,w=vp.offsetWidth;
    window.addEventListener('resize',function(){w=vp.offsetWidth;go(cur)});
    function go(n){cur=Math.max(0,Math.min(total-1,n));tr.style.transform='translateX('+(-cur*w)+'px)';upProg(cur,total)}
    vp.addEventListener('touchstart',function(e){sx=e.touches[0].clientX;dr=true;dx=0;tr.classList.add('drag')},{passive:true});
    vp.addEventListener('touchmove',function(e){if(!dr)return;dx=e.touches[0].clientX-sx;var o=-cur*w+dx;if(o>0)o*=.3;if(o<-(total-1)*w)o=-(total-1)*w+(o+(total-1)*w)*.3;tr.style.transform='translateX('+o+'px)';hideHint()},{passive:true});
    vp.addEventListener('touchend',function(){if(!dr)return;dr=false;tr.classList.remove('drag');var th=w*.2;if(dx<-th&&cur<total-1)go(cur+1);else if(dx>th&&cur>0)go(cur-1);else go(cur);dx=0});
    // Mouse
    var md=false,msx=0,mdx=0;
    vp.addEventListener('mousedown',function(e){msx=e.clientX;md=true;mdx=0;tr.classList.add('drag');e.preventDefault()});
    window.addEventListener('mousemove',function(e){if(!md)return;mdx=e.clientX-msx;var o=-cur*w+mdx;if(o>0)o*=.3;if(o<-(total-1)*w)o=-(total-1)*w+(o+(total-1)*w)*.3;tr.style.transform='translateX('+o+'px)';hideHint()});
    window.addEventListener('mouseup',function(){if(!md)return;md=false;tr.classList.remove('drag');var th=w*.2;if(mdx<-th&&cur<total-1)go(cur+1);else if(mdx>th&&cur>0)go(cur-1);else go(cur);mdx=0});
    go(0);
}

// ═══ V-SLIDER ENGINE ═══
function initVSlider(total){
    var vp=document.getElementById('vvp'),tr=document.getElementById('vtrack');if(!vp||!tr)return;
    var cur=0,sy=0,dy=0,dr=false,h=vp.offsetHeight;
    var sls=tr.querySelectorAll('.sl');sls.forEach(function(s){s.style.height=h+'px'});
    window.addEventListener('resize',function(){h=vp.offsetHeight;sls.forEach(function(s){s.style.height=h+'px'});go(cur)});
    function go(n){cur=Math.max(0,Math.min(total-1,n));tr.style.transform='translateY('+(-cur*h)+'px)';upProg(cur,total)}
    vp.addEventListener('touchstart',function(e){sy=e.touches[0].clientY;dr=true;dy=0;tr.classList.add('drag')},{passive:false});
    vp.addEventListener('touchmove',function(e){if(!dr)return;e.preventDefault();dy=e.touches[0].clientY-sy;var o=-cur*h+dy;if(o>0)o*=.3;if(o<-(total-1)*h)o=-(total-1)*h+(o+(total-1)*h)*.3;tr.style.transform='translateY('+o+'px)';hideHint()},{passive:false});
    vp.addEventListener('touchend',function(){if(!dr)return;dr=false;tr.classList.remove('drag');var th=h*.2;if(dy<-th&&cur<total-1)go(cur+1);else if(dy>th&&cur>0)go(cur-1);else go(cur);dy=0});
    // Mouse
    var md=false,msy=0,mdy=0;
    vp.addEventListener('mousedown',function(e){msy=e.clientY;md=true;mdy=0;tr.classList.add('drag');e.preventDefault()});
    window.addEventListener('mousemove',function(e){if(!md)return;mdy=e.clientY-msy;var o=-cur*h+mdy;if(o>0)o*=.3;if(o<-(total-1)*h)o=-(total-1)*h+(o+(total-1)*h)*.3;tr.style.transform='translateY('+o+'px)';hideHint()});
    window.addEventListener('mouseup',function(){if(!md)return;md=false;tr.classList.remove('drag');var t=h*.2;if(mdy<-t&&cur<total-1)go(cur+1);else if(mdy>t&&cur>0)go(cur-1);else go(cur);mdy=0});
    vp.addEventListener('wheel',function(e){e.preventDefault();if(e.deltaY>30&&cur<total-1)go(cur+1);else if(e.deltaY<-30&&cur>0)go(cur-1);hideHint()},{passive:false});
    go(0);
}

function upProg(c,t){var p=document.getElementById('prog');if(p)p.style.width=((c+1)/t*100)+'%'}
function getEmbed(u){if(!u)return'';var y=u.match(/(?:youtube\.com\/watch\?v=|youtu\.be\/|youtube\.com\/embed\/)([^&\s]+)/);if(y)return'https://www.youtube.com/embed/'+y[1]+'?rel=0';var v=u.match(/vimeo\.com\/(\d+)/);if(v)return'https://player.vimeo.com/video/'+v[1];return''}
</script>
