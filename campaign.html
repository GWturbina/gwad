<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title id="page-title">GlobalWay AdPlatform</title>
<meta property="og:title" content="" id="og-title">
<meta property="og:description" content="" id="og-desc">
<meta property="og:image" content="" id="og-image">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',Arial,sans-serif;background:#0a0a1a;color:#e0e0e0;min-height:100vh}
:root{--accent:#FFD700;--accent-dim:rgba(255,215,0,0.1)}
.wrap{max-width:560px;margin:0 auto;padding:0 20px}

/* Loading */
.loading-screen{position:fixed;top:0;left:0;right:0;bottom:0;background:#0a0a1a;display:flex;align-items:center;justify-content:center;z-index:100;transition:opacity .3s}
.loading-screen.hide{opacity:0;pointer-events:none}
.spinner{width:40px;height:40px;border:3px solid #333;border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* Hero */
.hero{padding:40px 0 30px;text-align:center}
.hero-logo{width:80px;height:80px;border-radius:50%;object-fit:cover;border:3px solid var(--accent);margin-bottom:16px}
.hero-logo-placeholder{width:80px;height:80px;border-radius:50%;background:var(--accent);display:flex;align-items:center;justify-content:center;font-size:36px;margin:0 auto 16px;border:3px solid var(--accent)}
.hero-title{font-size:32px;font-weight:800;color:var(--accent);line-height:1.2}
.hero-subtitle{font-size:16px;color:#aaa;margin-top:8px;line-height:1.6}
.hero-line{width:60px;height:2px;background:var(--accent);margin:20px auto}

/* Video */
.video-section{margin-bottom:24px}
.video-wrap{position:relative;padding-bottom:56.25%;height:0;border-radius:16px;overflow:hidden;border:1px solid #2a2a4a}
.video-wrap iframe{position:absolute;top:0;left:0;width:100%;height:100%;border:none}

/* Hero image */
.hero-image{width:100%;border-radius:16px;border:1px solid #2a2a4a;margin-bottom:24px;max-height:400px;object-fit:cover}

/* Features */
.feat-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:24px}
.feat-card{background:#141428;border-radius:14px;padding:16px;border:1px solid #2a2a4a;transition:border-color .3s}
.feat-card:hover{border-color:var(--accent)}
.feat-icon{font-size:24px;margin-bottom:6px}
.feat-text{font-size:12px;color:#ccc;line-height:1.5}

/* Stats bar */
.stats-bar{display:flex;justify-content:center;gap:24px;padding:16px;background:#141428;border-radius:12px;margin-bottom:24px;border:1px solid #2a2a4a}
.stat-item{text-align:center}
.stat-num{font-size:20px;font-weight:700;color:var(--accent)}
.stat-lbl{font-size:10px;color:#888}

/* Info card */
.info-card{background:#141428;border-radius:16px;padding:20px;border:1px solid #2a2a4a;margin-bottom:20px}
.info-card h3{color:var(--accent);font-size:16px;margin-bottom:10px}
.info-card p{font-size:13px;color:#aaa;line-height:1.7}

/* Steps */
.steps{position:relative;padding-left:36px;margin-bottom:24px}
.steps::before{content:'';position:absolute;left:14px;top:14px;bottom:14px;width:2px;background:#2a2a4a}
.step{position:relative;margin-bottom:20px}
.step:last-child{margin-bottom:0}
.step-num{position:absolute;left:-30px;top:0;width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;color:#fff;font-weight:700;background:var(--accent);color:#000}
.step-title{font-size:14px;font-weight:600;color:#fff}
.step-desc{font-size:12px;color:#888;margin-top:2px}

/* CTA */
.cta-btn{display:block;width:100%;padding:18px;background:linear-gradient(135deg,var(--accent),#FFA000);border:none;border-radius:14px;font-size:18px;font-weight:800;color:#000;cursor:pointer;text-align:center;text-decoration:none;transition:transform .2s,box-shadow .2s;margin-bottom:12px}
.cta-btn:hover{transform:translateY(-2px);box-shadow:0 8px 30px rgba(255,215,0,0.3)}
.cta-note{font-size:11px;color:#666;text-align:center;line-height:1.6}

/* Distribution */
.dist-bar{display:flex;height:24px;border-radius:8px;overflow:hidden;margin:12px 0 8px}
.dist-budget{flex:4;background:#10b981;display:flex;align-items:center;justify-content:center;font-size:10px;color:#fff;font-weight:600}
.dist-mkt{flex:1;background:var(--accent);display:flex;align-items:center;justify-content:center;font-size:9px;color:#000;font-weight:600}

/* Contacts */
.contact-row{display:flex;gap:10px;margin-top:16px;justify-content:center}
.contact-btn{padding:10px 20px;border-radius:10px;border:1px solid #2a2a4a;background:#141428;color:#ccc;text-decoration:none;font-size:13px;transition:.2s}
.contact-btn:hover{border-color:var(--accent);color:var(--accent)}

/* Tooltip */
.tip{position:relative;display:inline-block;cursor:help;margin-left:6px;width:16px;height:16px;border-radius:50%;background:rgba(255,215,0,0.2);color:var(--accent);font-size:10px;text-align:center;line-height:16px}
.tip:hover::after{content:attr(data-tip);position:absolute;bottom:24px;left:50%;transform:translateX(-50%);background:#1a1a35;color:#ccc;padding:8px 12px;border-radius:8px;font-size:11px;white-space:nowrap;border:1px solid #2a2a4a;z-index:10}

/* Footer */
.footer{padding:24px 0;text-align:center;border-top:1px solid #1a1a35;margin-top:20px}
.footer a{color:#555;text-decoration:none;font-size:12px}
.footer a:hover{color:var(--accent)}

/* 404 */
.not-found{text-align:center;padding:80px 20px}
.not-found h2{color:var(--accent);font-size:24px;margin-bottom:12px}
.not-found p{color:#888}
.not-found a{color:var(--accent)}

@keyframes fadeUp{from{opacity:0;transform:translateY(15px)}to{opacity:1;transform:translateY(0)}}
.fade{animation:fadeUp .5s ease both}
.d1{animation-delay:.1s}.d2{animation-delay:.2s}.d3{animation-delay:.3s}.d4{animation-delay:.4s}
</style>
</head>
<body>

<div class="loading-screen" id="loading"><div class="spinner"></div></div>

<div class="wrap" id="content" style="display:none">
    <!-- Заполняется динамически из JS -->
</div>

<div class="not-found" id="notfound" style="display:none">
    <h2>Кампания не найдена</h2>
    <p>Проверьте ссылку или <a href="/">вернитесь на главную</a></p>
</div>

<script>
(async function() {
    // Получаем slug из URL: /c/diamond → diamond
    var path = window.location.pathname;
    var slug = '';
    if (path.startsWith('/c/')) slug = path.replace('/c/', '').replace(/\/$/, '');
    // Также поддерживаем ?slug=diamond
    if (!slug) slug = new URLSearchParams(window.location.search).get('slug') || '';

    if (!slug) {
        document.getElementById('loading').classList.add('hide');
        document.getElementById('notfound').style.display = 'block';
        return;
    }

    try {
        var r = await fetch('/api/campaign-data?slug=' + slug);
        var data = await r.json();

        if (!data.ok || !data.campaign) {
            document.getElementById('loading').classList.add('hide');
            document.getElementById('notfound').style.display = 'block';
            return;
        }

        var c = data.campaign;
        var color = c.primary_color || '#FFD700';
        document.documentElement.style.setProperty('--accent', color);
        document.documentElement.style.setProperty('--accent-dim', color + '18');

        // OG tags
        document.getElementById('page-title').textContent = c.name + ' — GlobalWay AdPlatform';
        document.getElementById('og-title').content = c.name;
        document.getElementById('og-desc').content = c.description || c.subtitle || '';
        if (c.hero_image_url) document.getElementById('og-image').content = c.hero_image_url;

        // Build page
        var html = '';

        // Hero
        html += '<div class="hero fade">';
        if (c.logo_url) {
            html += '<img src="' + c.logo_url + '" class="hero-logo" alt="' + c.name + '">';
        } else {
            var icons = {diamond_club:'💎',metr:'🏠',cardgift:'🎁'};
            html += '<div class="hero-logo-placeholder">' + (icons[c.target_project] || '📢') + '</div>';
        }
        html += '<div class="hero-title">' + esc(c.name) + '</div>';
        if (c.subtitle) html += '<div class="hero-subtitle">' + esc(c.subtitle) + '</div>';
        html += '<div class="hero-line"></div>';
        html += '</div>';

        // Video
        if (c.video_url) {
            var embedUrl = getEmbedUrl(c.video_url);
            if (embedUrl) {
                html += '<div class="video-section fade d1"><div class="video-wrap">';
                html += '<iframe src="' + embedUrl + '" allowfullscreen></iframe>';
                html += '</div></div>';
            }
        }

        // Hero image (if no video)
        if (!c.video_url && c.hero_image_url) {
            html += '<img src="' + esc(c.hero_image_url) + '" class="hero-image fade d1" alt="' + esc(c.name) + '">';
        }

        // Description
        if (c.description) {
            html += '<div class="info-card fade d2"><p>' + esc(c.description).replace(/\n/g, '<br>') + '</p></div>';
        }

        // Stats
        html += '<div class="stats-bar fade d2">';
        html += '<div class="stat-item"><div class="stat-num">' + (c.active_participants || 0) + '</div><div class="stat-lbl">участников</div></div>';
        html += '<div class="stat-item"><div class="stat-num">' + (c.total_clicks || 0) + '</div><div class="stat-lbl">кликов</div></div>';
        html += '<div class="stat-item"><div class="stat-num">' + (c.total_registrations || 0) + '</div><div class="stat-lbl">регистраций</div></div>';
        html += '</div>';

        // Features
        if (c.features) {
            var feats = c.features.split('\n').filter(function(f) { return f.trim(); });
            if (feats.length > 0) {
                html += '<div class="feat-grid fade d2">';
                feats.forEach(function(f) {
                    var parts = f.split('|');
                    var icon = parts.length > 1 ? parts[0].trim() : '✅';
                    var text = parts.length > 1 ? parts[1].trim() : parts[0].trim();
                    html += '<div class="feat-card"><div class="feat-icon">' + icon + '</div><div class="feat-text">' + esc(text) + '</div></div>';
                });
                html += '</div>';
            }
        }

        // How it works
        html += '<div class="info-card fade d3">';
        html += '<h3>Как это работает <span class="tip" data-tip="Оплата через смарт-контракт на блокчейне opBNB">?</span></h3>';
        html += '<div class="steps">';
        html += '<div class="step"><div class="step-num">1</div><div class="step-title">Регистрация в GlobalWay</div><div class="step-desc">Подключите кошелёк и получите кабинет</div></div>';
        html += '<div class="step"><div class="step-num">2</div><div class="step-title">Оплатите рекламу от $5</div><div class="step-desc">80% бюджет, 20% партнёрка — всё на блокчейне</div></div>';
        html += '<div class="step"><div class="step-num">3</div><div class="step-title">Получайте клиентов</div><div class="step-desc">Менеджер запускает рекламу, контакты приходят в ваш кабинет</div></div>';
        html += '</div></div>';

        // Distribution
        html += '<div class="info-card fade d3">';
        html += '<h3>Распределение платежа <span class="tip" data-tip="Смарт-контракт автоматически распределяет средства">?</span></h3>';
        html += '<div class="dist-bar"><div class="dist-budget">80% бюджет</div><div class="dist-mkt">20%</div></div>';
        html += '<p style="font-size:11px;color:#888">20% маркетинг: 9 уровней спонсоров + менеджер + клуб + токенизация</p>';
        html += '</div>';

        // CTA
        var refParam = new URLSearchParams(window.location.search).get('ref') || '';
        var ctaUrl = 'https://cgift.club/registration.html' + (refParam ? '?ref=' + refParam : '') + (refParam ? '&' : '?') + 'utm_source=gwads&utm_campaign=' + slug;

        html += '<div class="fade d4" style="padding:20px 0">';
        html += '<a href="' + ctaUrl + '" class="cta-btn">' + esc(c.cta_text || 'Начать зарабатывать') + '</a>';
        html += '<div class="cta-note">Требуется кошелёк SafePal · opBNB сеть · Оплата в USDT</div>';
        html += '</div>';

        // Contacts
        if (c.contact_telegram || c.contact_whatsapp) {
            html += '<div class="contact-row fade d4">';
            if (c.contact_telegram) html += '<a href="https://t.me/' + esc(c.contact_telegram.replace('@','')) + '" class="contact-btn" target="_blank">📱 Telegram</a>';
            if (c.contact_whatsapp) html += '<a href="https://wa.me/' + esc(c.contact_whatsapp.replace(/[^0-9]/g,'')) + '" class="contact-btn" target="_blank">💬 WhatsApp</a>';
            html += '</div>';
        }

        // Footer
        html += '<div class="footer"><a href="/">GlobalWay AdPlatform</a> · <a href="https://cgift.club">CardGift</a></div>';

        document.getElementById('content').innerHTML = html;
        document.getElementById('content').style.display = 'block';
        document.getElementById('loading').classList.add('hide');

    } catch(e) {
        console.error('Campaign load error:', e);
        document.getElementById('loading').classList.add('hide');
        document.getElementById('notfound').style.display = 'block';
    }
})();

function esc(s) { var d = document.createElement('div'); d.textContent = s || ''; return d.innerHTML; }

function getEmbedUrl(url) {
    if (!url) return '';
    // YouTube
    var yt = url.match(/(?:youtube\.com\/watch\?v=|youtu\.be\/|youtube\.com\/embed\/)([^&\s]+)/);
    if (yt) return 'https://www.youtube.com/embed/' + yt[1] + '?rel=0';
    // Vimeo
    var vm = url.match(/vimeo\.com\/(\d+)/);
    if (vm) return 'https://player.vimeo.com/video/' + vm[1];
    // Direct embed URL
    if (url.includes('embed')) return url;
    return '';
}
</script>
</body>
</html>
